plugins:
  - rubocop-minitest
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "sorbet/rbi/**/*"
    - "results/**/*"
    - "vendor/**/*"
    - "tmp/**/*"
    - "bin/render_report"
    - "bin/bench"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Style/StringLiterals:
  EnforcedStyle: double_quotes

# syntax_tree が trailing comma を削除するため、RuboCop でも no_comma に揃える
Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: no_comma
Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: no_comma
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: no_comma

# Measurement は計測項目を全てキーワード引数で渡すため許容
Metrics/ParameterLists:
  Max: 15
  CountKeywordArgs: false

# 計測ハーネス内のブロック明示はパフォーマンス測定の安定性のため意図的
Style/ArgumentsForwarding:
  Enabled: false

# Sorbet sig が block: を要求するため anonymous block forwarding は使えない
Naming/BlockForwarding:
  Enabled: false

# Sorbet sig が block: を要求するため block.call を許容
Performance/RedundantBlockCall:
  Enabled: false

# Sorbet sig ブロック由来の Style 違反を無効化
Style/AccessorGrouping:
  Enabled: false

# to_h は将来の拡張余地のため明示的な each_with_object を許容
Style/ReduceToHash:
  Enabled: false

# Measurement#with は **overrides を merge する設計を意図的に維持
Style/KeywordArgumentsMerging:
  Enabled: false

Metrics/MethodLength:
  Max: 80

Metrics/AbcSize:
  Max: 80

Metrics/BlockLength:
  Max: 60

Metrics/ClassLength:
  Max: 250

Metrics/ModuleLength:
  Max: 250

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/PerceivedComplexity:
  Max: 12

Layout/LineLength:
  Max: 150

Naming/FileName:
  Exclude:
    - "bin/bench"
    - "bin/render_report"

# 数学的慣用名 (n は数列の項、cr/ci は実部/虚部、dt は時間刻み) を許可
Naming/MethodParameterName:
  AllowedNames:
    - n
    - cr
    - ci
    - dt
    - x
    - y
    - z

Layout/MultilineMethodCallIndentation:
  Enabled: false
Layout/FirstHashElementIndentation:
  Enabled: false
