name: ruby-vs-truffleruby-bench CI

# 当リポジトリ自身がベンチプロジェクトのルートのため、
# paths/working-directory に "ruby-vs-truffleruby-bench/" を付けるとマッチせず
# Actions が一切発火しなくなる (過去のコミットで該当)。リポジトリルート基準で記述する。
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates (MRI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
      - name: syntax_tree check
        run: bundle exec stree check 'lib/**/*.rb' 'test/**/*.rb' 'bin/*'
      - name: RuboCop
        run: bundle exec rubocop
      - name: Sorbet typecheck
        run: bundle exec srb tc
      - name: Minitest
        run: bundle exec rake test

  docker-build:
    name: Docker build (both runtimes)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Build images
        run: docker compose build

  smoke-bench:
    name: Smoke bench (matrix)
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      fail-fast: false
      matrix:
        runtime: [ruby34, truffleruby34]
    env:
      RVTB_RUNTIME: ${{ matrix.runtime }}
    steps:
      - uses: actions/checkout@v6
      # docker-build ジョブの成果イメージは別 runner にあるため、matrix runner では再度 build が必要です。
      # registry や buildx cache を導入していないため、現状はジョブ間で重複ビルドを許容しています。
      - name: Build target image
        run: docker compose build "$RVTB_RUNTIME"
      # -o は docker-compose.yml で設定した RUBY_BENCH_RESULT_PATH を意図的に上書きし、
      # アーティファクトのアップロードパスを matrix.runtime と一致させるための指定です。
      - name: Run smoke bench
        run: docker compose run --rm "$RVTB_RUNTIME" bundle exec bin/bench --smoke -o "results/$RVTB_RUNTIME.json"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.runtime }}
          path: results/${{ matrix.runtime }}.json
